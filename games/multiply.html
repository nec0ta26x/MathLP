<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乗除法チャレンジ | Math Quest</title>
  <link rel="stylesheet" href="../css/game-nav.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #eeedf3;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.3s ease;
    }

    .game {
      width: min(300px, 100vw - 2.5rem);
      display: flex; flex-direction: column; align-items: center; gap: 1.5rem;
    }

    .header { width: 100%; display: flex; justify-content: space-between; align-items: center; }
    .title { font-size: 0.6rem; letter-spacing: 0.22em; color: #b3b0c4; font-weight: 500; }
    .score { font-size: 0.75rem; color: #b3b0c4; }
    .score b { color: #2d2b3d; font-size: 1rem; font-weight: 600; }

    .expr-card {
      width: 100%; background: white; border-radius: 24px;
      padding: 2.2rem 1.5rem 1.8rem; text-align: center;
      box-shadow: 0 2px 4px rgba(60,58,90,0.06), 0 12px 40px rgba(60,58,90,0.12);
      display: flex; flex-direction: column; align-items: center; gap: 0.6rem;
      transition: background 0.28s ease, opacity 0.16s ease;
    }
    .expr-card.ok  { background: #d1fae5; }
    .expr-card.err { background: #fee2e2; }

    .expr {
      font-weight: 200; color: #1c1b28;
      letter-spacing: -0.02em; line-height: 1.2; transition: color 0.28s;
    }
    .expr-card.ok  .expr { color: #059669; }
    .expr-card.err .expr { color: #dc2626; }
    .expr-label { font-size: 0.75rem; color: #b3b0c4; letter-spacing: 0.08em; }

    /* 分数表示 */
    .frac {
      display: inline-flex; flex-direction: column; align-items: center;
      vertical-align: middle; font-size: 0.58em; line-height: 1.15;
      margin: 0 0.06em;
    }
    .fnum { border-bottom: 1.5px solid currentColor; padding: 0 0.2em; text-align: center; min-width: 0.8em; }
    .fden { padding: 0 0.2em; text-align: center; min-width: 0.8em; }

    .fb {
      font-size: 0.74rem; min-height: 1.1rem;
      color: transparent; transition: color 0.2s; text-align: center; line-height: 1.4;
    }
    .fb.ok  { color: #059669; }
    .fb.err { color: #dc2626; }

    .choices {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem; width: 100%;
    }
    .choice {
      padding: 1.05rem 0;
      background: #ede9fe; color: #4c1d95;
      border: none; border-radius: 14px;
      font-size: 1rem; font-weight: 700;
      font-family: inherit; font-variant-numeric: tabular-nums;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, transform 0.1s;
    }
    .choice:active { transform: scale(0.95); }
    .choice:disabled { cursor: default; }
    .choice.hit  { background: #22c55e; color: white; }
    .choice.miss { background: #ef4444; color: white; }

    .hint-wrap { width: 100%; }
    .hint-btn {
      display: flex; align-items: center; gap: 0.25rem;
      margin: 0 auto; background: none; border: none;
      font-family: inherit; font-size: 0.67rem; color: #c0bdce;
      cursor: pointer; padding: 0.2rem 0.4rem;
      border-radius: 6px; transition: color 0.15s; letter-spacing: 0.04em;
    }
    .hint-btn:hover { color: #7c78a0; }
    .chev { display: inline-block; transition: transform 0.22s; font-size: 0.55rem; }
    .chev.open { transform: rotate(90deg); }
    .hint-body {
      display: none; flex-direction: column; gap: 0.55rem;
      margin-top: 0.65rem; padding: 0.9rem 1rem;
      background: white; border-radius: 14px;
      box-shadow: 0 2px 14px rgba(60,58,90,0.08);
    }
    .hint-body.open { display: flex; }
    .hp-row {
      display: flex; align-items: center; gap: 0.7rem;
      font-size: 0.76rem; color: #64748b;
      border-bottom: 1px solid #f1f0f6; padding-bottom: 0.5rem;
    }
    .hp-row:last-child { border-bottom: none; padding-bottom: 0; }
    .hp-key { font-size: 0.88rem; font-weight: 300; color: #1c1b28; min-width: 60px; text-align: right; flex-shrink: 0; }
    .hp-calc { flex: 1; line-height: 1.5; }
    .hp-calc b { color: #1c1b28; }
    .hp-calc .pos { color: #059669; font-weight: 700; }
    .hp-calc .neg { color: #dc2626; font-weight: 700; }

    /* ══ STREAK SYSTEM ══ */
    .toast {
      position: fixed; top: 1.2rem; left: 50%;
      transform: translateX(-50%) translateY(-80px);
      padding: 0.5rem 1.4rem; border-radius: 50px;
      font-size: 0.92rem; font-weight: 700; color: white;
      box-shadow: 0 6px 24px rgba(0,0,0,0.22); opacity: 0;
      transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s ease;
      z-index: 300; pointer-events: none; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      18% { transform: translateX(-9px); } 36% { transform: translateX(9px); }
      54% { transform: translateX(-6px); } 72% { transform: translateX(6px); }
    }
    .shaking { animation: shake 0.45s ease; }

    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      80%  { opacity: 0.85; }
      100% { transform: translateY(110vh) rotate(750deg); opacity: 0; }
    }

    .clear-overlay {
      position: fixed; inset: 0; background: rgba(28,27,40,0.84);
      display: flex; align-items: center; justify-content: center;
      z-index: 500; opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .clear-overlay.show { opacity: 1; pointer-events: all; }
    .clear-card {
      background: white; border-radius: 28px; padding: 2.6rem 2rem 2rem;
      text-align: center; width: min(278px, 90vw);
      box-shadow: 0 28px 60px rgba(0,0,0,0.35);
      transform: scale(0.82);
      transition: transform 0.42s cubic-bezier(0.34,1.56,0.64,1);
    }
    .clear-overlay.show .clear-card { transform: scale(1); }
    .clear-emoji  { font-size: 3rem; line-height: 1; margin-bottom: 0.3rem; }
    .clear-title  { font-size: 2.4rem; font-weight: 800; color: #1c1b28; letter-spacing: -0.04em; margin-bottom: 0.25rem; }
    .clear-streak { font-size: 0.8rem; font-weight: 700; color: #6d28d9; letter-spacing: 0.06em; margin-bottom: 1.3rem; }
    .clear-divider { width: 36px; height: 2px; background: #eeedf3; margin: 0 auto 1.2rem; }
    .clear-stat { font-size: 0.82rem; color: #94a3b8; margin-bottom: 0.2rem; }
    .clear-stat b { color: #1c1b28; font-size: 1rem; }
    .clear-actions { margin-top: 1.7rem; }
    .clear-retry {
      background: #1c1b28; color: white; border: none; border-radius: 14px;
      padding: 0.9rem 2.5rem; font-size: 0.9rem; font-family: inherit;
      font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .clear-retry:hover { background: #2d2b3d; }
  </style>
</head>
<body>

<a class="site-back" href="../index.html#games" aria-label="ゲーム一覧へ戻る">‹ ゲーム一覧へ</a>

<div class="toast" id="toast"></div>

<div class="game" id="gameEl">
  <div class="header">
    <div class="title">乗除法チャレンジ</div>
    <div class="score"><b id="sc">0</b> / <span id="tot">0</span></div>
  </div>

  <div class="expr-card" id="exprCard">
    <div class="expr" id="exprEl">&mdash;</div>
    <div class="expr-label">= ?</div>
  </div>

  <div class="fb" id="fb"></div>

  <div class="choices">
    <button class="choice" id="c0" onclick="answer(0)">&mdash;</button>
    <button class="choice" id="c1" onclick="answer(1)">&mdash;</button>
    <button class="choice" id="c2" onclick="answer(2)">&mdash;</button>
  </div>

  <div class="hint-wrap">
    <button class="hint-btn" onclick="toggleHint()">
      <span class="chev" id="chev">&#9658;</span> 符号のルール
    </button>
    <div class="hint-body" id="hb">
      <div class="hp-row">
        <span class="hp-key">負&#215;負</span>
        <span class="hp-calc">= <span class="pos">正</span>　（&#8722;2)&#215;(&#8722;3)=<b>6</b></span>
      </div>
      <div class="hp-row">
        <span class="hp-key">負&#215;正</span>
        <span class="hp-calc">= <span class="neg">負</span>　（&#8722;2)&#215;3=<b>&#8722;6</b></span>
      </div>
      <div class="hp-row">
        <span class="hp-key">負の個数</span>
        <span class="hp-calc"><span class="pos">偶数</span>個 → 正，<span class="neg">奇数</span>個 → 負</span>
      </div>
      <div class="hp-row">
        <span class="hp-key">÷分数</span>
        <span class="hp-calc">逆数を掛ける<br>&#247;(&#8722;3/4)=&#215;(&#8722;4/3)</span>
      </div>
    </div>
  </div>
</div>

<div class="clear-overlay" id="clearOverlay">
  <div class="clear-card">
    <div class="clear-emoji">&#127882;</div>
    <div class="clear-title">クリア！</div>
    <div class="clear-streak">10 問連続正解！！</div>
    <div class="clear-divider"></div>
    <p class="clear-stat">正解率 <b id="clearRate">&#8212;</b></p>
    <p class="clear-stat"><b id="clearFrac">&#8212;</b> 問正解</p>
    <div class="clear-actions">
      <button class="clear-retry" onclick="resetGame()">もう一度</button>
    </div>
  </div>
</div>

<script>
  var questions = [
    // 乗法 基本
    { expr:'(&#8722;9)&#215;(&#8722;6)',               val:54,  opts:[54,-54,15],    calc:'負&#215;負=正，9&#215;6=54' },
    { expr:'(&#8722;3)&#215;4',                        val:-12, opts:[-12,12,-7],    calc:'負&#215;正=負，3&#215;4=12' },
    { expr:'5&#215;(&#8722;7)',                         val:-35, opts:[-35,35,-2],    calc:'正&#215;負=負，5&#215;7=35' },
    { expr:'(&#8722;4)&#215;(&#8722;5)',               val:20,  opts:[20,-20,1],     calc:'負&#215;負=正，4&#215;5=20' },
    { expr:'(&#8722;6)&#215;(&#8722;6)',               val:36,  opts:[36,-36,-12],   calc:'負&#215;負=正，6&#215;6=36' },
    { expr:'8&#215;(&#8722;4)',                         val:-32, opts:[-32,32,-4],    calc:'正&#215;負=負，8&#215;4=32' },
    // 除法 基本
    { expr:'(&#8722;36)&#247;(&#8722;4)',              val:9,   opts:[9,-9,-32],     calc:'負&#247;負=正，36&#247;4=9' },
    { expr:'(&#8722;12)&#247;3',                       val:-4,  opts:[-4,4,-9],      calc:'負&#247;正=負，12&#247;3=4' },
    { expr:'15&#247;(&#8722;3)',                        val:-5,  opts:[-5,5,-12],     calc:'正&#247;負=負，15&#247;3=5' },
    { expr:'(&#8722;24)&#247;(&#8722;8)',              val:3,   opts:[3,-3,-16],     calc:'負&#247;負=正，24&#247;8=3' },
    // 分数の除法
    { expr:'6&#247;(&#8722;<span class="frac"><span class="fnum">3</span><span class="fden">4</span></span>)',  val:-8,  opts:[-8,8,-2],      calc:'6&#215;(&#8722;4/3)=&#8722;8' },
    { expr:'3&#247;(&#8722;<span class="frac"><span class="fnum">1</span><span class="fden">2</span></span>)',  val:-6,  opts:[-6,6,-2],      calc:'3&#215;(&#8722;2)=&#8722;6' },
    // 3項 (符号の個数がポイント)
    { expr:'(&#8722;2)&#215;(&#8722;3)&#215;(&#8722;4)', val:-24, opts:[-24,24,-9], calc:'負3つ&#8594;負，2&#215;3&#215;4=24' },
    { expr:'(&#8722;2)&#215;3&#215;(&#8722;4)',        val:24,  opts:[24,-24,-6],    calc:'負2つ&#8594;正，2&#215;3&#215;4=24' },
    { expr:'(&#8722;36)&#247;(&#8722;4)&#215;(&#8722;9)', val:-81, opts:[-81,81,-9], calc:'9&#215;(&#8722;9)=&#8722;81' },
    { expr:'(&#8722;3)&#215;4&#247;(&#8722;6)',        val:2,   opts:[2,-2,-8],      calc:'&#8722;12&#247;(&#8722;6)=2' },
  ];

  var CONFETTI_COLORS = ['#7c3aed','#0891b2','#22c55e','#f97316','#ec4899','#eab308','#3b82f6'];
  var MILESTONES = {
    3: { msg:'&#128293; 3連続！',       bg:'#d97706', flash:'#fffbeb', confetti:0,  shake:false },
    5: { msg:'&#11088; 5連続！！',      bg:'#f97316', flash:'#fff7ed', confetti:15, shake:false },
    8: { msg:'&#128640; 8連続！！！',   bg:'#7c3aed', flash:'#f5f3ff', confetti:25, shake:true  },
    9: { msg:'&#127775; 9連続！！！！', bg:'#059669', flash:'#ecfdf5', confetti:35, shake:true  },
  };

  var pool = [], pidx = 0, cur = null, curOpts = [];
  var okCount = 0, totCount = 0, streak = 0, locked = false;

  function $(id) { return document.getElementById(id); }

  function shuffle(a) {
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function setFb(text, cls) {
    var el = $('fb');
    el.innerHTML = text;
    el.className = 'fb' + (cls ? ' ' + cls : '');
  }

  function setExprSize(expr) {
    // Use a temp element to measure actual text length (strips HTML tags)
    var tmp = document.createElement('div');
    tmp.innerHTML = expr;
    var len = (tmp.textContent || tmp.innerText || '').length;
    $('exprEl').style.fontSize = len <= 7 ? '2.8rem' : len <= 11 ? '2.2rem' : '1.75rem';
  }

  // ── streak ──
  var toastTimer;
  function showToast(msg, bg) {
    var t = $('toast');
    clearTimeout(toastTimer);
    t.innerHTML = msg;
    t.style.background = bg;
    t.classList.remove('show');
    void t.offsetWidth;
    t.classList.add('show');
    toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2300);
  }
  function flashBg(color) {
    document.body.style.background = color;
    setTimeout(function() { document.body.style.background = '#eeedf3'; }, 330);
  }
  function spawnConfetti(count) {
    for (var i = 0; i < count; i++) {
      (function() {
        var el = document.createElement('div');
        var sz = 6 + Math.random() * 9;
        el.style.cssText = 'position:fixed;z-index:600;' +
          'left:' + (4 + Math.random() * 92) + 'vw;' +
          'top:-' + (8 + Math.random() * 14) + 'px;' +
          'width:' + sz + 'px;height:' + sz + 'px;' +
          'background:' + CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)] + ';' +
          'border-radius:' + (Math.random() > 0.5 ? '50%' : '3px') + ';' +
          'animation:confettiFall ' + (1.4 + Math.random() * 1.6) + 's ease-in forwards;' +
          'animation-delay:' + (Math.random() * 0.7) + 's;pointer-events:none;';
        document.body.appendChild(el);
        setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 3800);
      })();
    }
  }
  function shakeGame() {
    var el = $('gameEl');
    el.classList.remove('shaking');
    void el.offsetWidth;
    el.classList.add('shaking');
    setTimeout(function() { el.classList.remove('shaking'); }, 500);
  }
  function checkStreak() {
    if (streak === 10) {
      flashBg('#f0fdf4');
      setTimeout(function() { spawnConfetti(45); showClear(); }, 1300);
      return true;
    }
    var m = MILESTONES[streak];
    if (m) {
      showToast(m.msg, m.bg);
      flashBg(m.flash);
      if (m.confetti > 0) spawnConfetti(m.confetti);
      if (m.shake) shakeGame();
    }
    return false;
  }
  function showClear() {
    var rate = totCount > 0 ? Math.round(okCount / totCount * 100) : 0;
    $('clearRate').textContent = rate + '%';
    $('clearFrac').textContent = okCount + ' / ' + totCount;
    $('clearOverlay').classList.add('show');
  }
  function resetGame() {
    streak = 0; okCount = 0; totCount = 0;
    $('sc').textContent = '0';
    $('tot').textContent = '0';
    $('clearOverlay').classList.remove('show');
    for (var i = 0; i < 3; i++) $('c' + i).className = 'choice';
    $('exprCard').className = 'expr-card';
    $('exprCard').style.opacity = '1';
    locked = false;
    loadQ();
    setFb('', '');
  }

  // ── core ──
  function loadQ() {
    if (pidx >= pool.length) {
      pool = shuffle(pool.slice());
      pidx = 0;
    }
    cur = pool[pidx++];
    curOpts = shuffle(cur.opts.slice());
    $('exprEl').innerHTML = cur.expr;
    setExprSize(cur.expr);
    for (var i = 0; i < 3; i++) {
      $('c' + i).textContent = curOpts[i];
      $('c' + i).className = 'choice';
      $('c' + i).disabled = false;
    }
  }

  function next() {
    $('exprCard').style.opacity = '0';
    setTimeout(function() {
      $('exprCard').className = 'expr-card';
      $('exprCard').style.opacity = '1';
      loadQ();
      setFb('', '');
      locked = false;
    }, 175);
  }

  function answer(idx) {
    if (locked) return;
    locked = true;
    for (var i = 0; i < 3; i++) $('c' + i).disabled = true;

    var chosen = curOpts[idx];
    var right = (chosen === cur.val);
    var correctShuffledIdx = curOpts.indexOf(cur.val);

    totCount++;

    if (right) {
      okCount++;
      streak++;
      $('c' + idx).classList.add('hit');
      $('exprCard').classList.add('ok');
      setFb('正解 &#10003;', 'ok');
      if (!checkStreak()) setTimeout(next, 1700);
    } else {
      streak = 0;
      $('c' + idx).classList.add('miss');
      $('c' + correctShuffledIdx).classList.add('hit');
      $('exprCard').classList.add('err');
      setFb('正解は ' + cur.val + '（' + cur.calc + '）', 'err');
      setTimeout(next, 1800);
    }
    $('sc').textContent = okCount;
    $('tot').textContent = totCount;
  }

  function toggleHint() {
    $('hb').classList.toggle('open');
    $('chev').classList.toggle('open');
  }

  // init
  for (var i = 0; i < questions.length; i++) pool.push(questions[i]);
  pool = shuffle(pool);
  loadQ();
</script>
</body>
</html>
